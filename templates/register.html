{% extends "base.html" %}
{% block title %}Register — SkyWings{% endblock %}

{% block content %}
<div class="auth-container" style="align-items:flex-start; padding-top:3rem">
  <div class="auth-card" style="max-width:560px">
    <div class="auth-logo">
      <span class="plane">✈</span>
      <h2>Create Account</h2>
      <p>Join SkyWings and start flying today</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="full_name">Full Name</label>
          <input type="text" id="full_name" name="full_name" class="form-control"
                 placeholder="Rahul Sharma" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="rahul@example.com" required autocomplete="email" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Min. 6 characters" required minlength="6" />
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password"
                 class="form-control" placeholder="Re-enter password" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" class="form-control"
                 placeholder="+91 98765 43210" />
        </div>
        <div class="form-group">
          <label class="form-label" for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" class="form-control" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-control">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other / Prefer not to say</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">
        🚀 Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account?
      <a href="{{ url_for('login') }}"><strong>Sign in here</strong></a>
    </div>
  </div>
</div>
{% endblock %}
